<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math to Letter Puzzle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <p><a class="back-link" href="index.html">← Back to Home</a></p>

    <h1>Math → Letter Puzzle</h1>
    <p class="subtitle">
      Solve each math problem. Then use 1=A, 2=B, 3=C ... 26=Z to decode the phrase.
    </p>

    <div class="key">
      1=A, 2=B, 3=C, 4=D, 5=E, 6=F, 7=G, 8=H, 9=I, 10=J, 11=K, 12=L, 13=M,
      14=N, 15=O, 16=P, 17=Q, 18=R, 19=S, 20=T, 21=U, 22=V, 23=W, 24=X, 25=Y, 26=Z
    </div>


    <div class="custom-area">

<p><strong>Create your own puzzle</strong></p>

<input id="customPhrase" placeholder="Enter a phrase (A–Z only)">
<button onclick="generateCustomPuzzle()">Generate Puzzle</button>

</div>






    
    <button onclick="generatePuzzle()">New Puzzle</button>

    <div id="puzzle" class="puzzle-grid"></div>

    <div class="answer-area">
      <input id="playerAnswer" type="text" placeholder="Type your phrase here" />
      <button onclick="checkAnswer()">Check Answer</button>
      <button onclick="showAnswer()">Show Answer</button>
    </div>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
