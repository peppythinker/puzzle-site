<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maze Puzzle</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <div class="page">
    <a href="../index.html" class="back-link">← Back to games</a>

    <div class="hero">
      <h1>Maze Puzzle</h1>
      <p class="subtitle">Find your way from start to finish.</p>
    </div>

    <div class="legend-card">
      Choose a difficulty and maze style, then generate a new puzzle.
    </div>

    <div class="mode-section">
      <div class="maze-controls">
        <label>
          Difficulty
          <select id="difficultySelect" class="maze-select">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
          </select>
        </label>

        <label>
          Style
          <select id="styleSelect" class="maze-select">
            <option value="random" selected>Random</option>
            <option value="horizontal">Mostly Horizontal</option>
            <option value="vertical">Mostly Vertical</option>
            <option value="checkerboard">Checkerboard Feel</option>
          </select>
        </label>

        <button id="generateMazeBtn" class="primary-btn">Generate Maze</button>
      </div>
    </div>

    <div class="game-section maze-card">
      <div class="maze-legend">
        <span class="maze-badge start-badge">START</span>
        <span class="maze-badge finish-badge">FINISH</span>
      </div>

      <canvas id="mazeCanvas" width="700" height="700"></canvas>

      <p class="maze-help-text">
        Start in the top-left corner and find the exit at the bottom-right.
      </p>
    </div>
  </div>

  <script src="maze.js"></script>
</body>
</html>
